<html lang="ko">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단어 퀴즈</title>

<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1917;
    --text-muted: #8a8780;
    --accent: #3d6b4f;
    --accent-light: #eaf2ed;
    --danger: #c0392b;
    --danger-light: #fdf0ee;
    --timer-full: #3d6b4f;
    --timer-mid: #e67e22;
    --timer-low: #c0392b;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .screen { display: none; width: 100%; max-width: 560px; }
  .screen.active { display: block; }

  /* ── START ── */
  .start-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .start-card h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
  .start-card > p { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 36px; }

  .input-group { text-align: left; margin-bottom: 12px; }
  .input-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.3px; }
  .input-group input[type="number"] {
    width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 1rem; font-family: 'DM Mono', monospace; color: var(--text); background: var(--bg);
    outline: none; transition: border-color 0.15s;
  }
  .input-group input[type="number"]:focus { border-color: var(--accent); }

  .hint { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 28px; text-align: left; }

  .btn-start {
    width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 0.95rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-start:hover { opacity: 0.9; }
  .btn-start:active { transform: scale(0.99); }

  /* ── QUIZ ── */
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

  .btn-pause {
    padding: 8px 18px; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.85rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text); cursor: pointer; transition: background 0.15s, border-color 0.15s; min-width: 80px;
  }
  .btn-pause:hover { background: var(--border); }
  .btn-pause.paused { background: var(--accent); color: #fff; border-color: var(--accent); }

  .timer-bar-wrap { height: 5px; background: var(--border); border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .timer-bar { height: 100%; border-radius: 99px; transition: width 0.1s linear, background 0.3s; background: var(--timer-full); }

  .word-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 40px 36px 32px; box-shadow: var(--shadow); margin-bottom: 16px; min-height: 180px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .word-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
  .word-display { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; letter-spacing: -0.5px; line-height: 1.2; }
  .timer-count { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--text-muted); margin-top: 16px; }

  .answer-wrap { display: flex; gap: 10px; }
  .answer-input {
    flex: 1; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.95rem; font-family: 'Noto Sans KR', sans-serif; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input:disabled { background: var(--bg); color: var(--text-muted); }

  .btn-next {
    padding: 13px 20px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 0.85rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
  }
  .btn-next:hover { opacity: 0.88; }

  /* ── PAUSE OVERLAY ── */
  .pause-overlay {
    display: none; position: fixed; inset: 0; background: rgba(247,246,243,0.88);
    backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; text-align: center;
  }
  .pause-overlay.show { display: flex; }
  .pause-overlay h2 { font-size: 1.4rem; font-weight: 700; }
  .pause-overlay p { color: var(--text-muted); font-size: 0.875rem; }
  .btn-resume {
    padding: 13px 32px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 0.95rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: opacity 0.15s; margin-top: 8px;
  }
  .btn-resume:hover { opacity: 0.88; }

  /* ── RESULT ── */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow);
  }

  .result-summary { text-align: center; margin-bottom: 32px; }
  .result-summary h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
  .score-display { display: inline-flex; align-items: baseline; gap: 4px; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .score-num { font-size: 3rem; font-weight: 500; color: var(--accent); line-height: 1; }
  .score-total { font-size: 1.2rem; color: var(--text-muted); }
  .score-pct { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--text-muted); }

  /* Tabs */
  .tab-bar { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
  .tab-btn {
    padding: 9px 20px; border: none; background: none; font-size: 0.85rem; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-muted); cursor: pointer;
    border-bottom: 2.5px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.tab-wrong.active { color: var(--danger); border-bottom-color: var(--danger); }
  .tab-btn.tab-correct.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; max-height: 380px; overflow-y: auto; margin-bottom: 24px; }
  .tab-panel.active { display: block; }

  .result-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }

  .result-item { padding: 10px 12px; border-radius: 7px; font-size: 0.82rem; line-height: 1.6; }
  .result-item.wrong-item { background: var(--danger-light); }
  .result-item.correct-item { background: var(--accent-light); }

  .item-word { font-family: 'DM Mono', monospace; font-weight: 500; display: block; margin-bottom: 4px; }
  .item-row { display: flex; align-items: baseline; gap: 6px; font-size: 0.76rem; }
  .item-label { color: var(--text-muted); flex-shrink: 0; min-width: 34px; }
  .item-correct { color: var(--accent); font-weight: 500; }
  .item-mine { color: var(--danger); }
  .item-skipped { color: var(--text-muted); font-style: italic; }
  .item-meaning { color: var(--text-muted); font-size: 0.76rem; }

  .empty-msg { font-size: 0.82rem; color: var(--text-muted); font-style: italic; padding: 6px 0; }

  .btn-restart {
    width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 0.9rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-restart:hover { opacity: 0.88; }

  @media (max-width: 480px) {
    .start-card { padding: 36px 24px; }
    .word-card { padding: 32px 24px 28px; }
    .word-display { font-size: 1.6rem; }
    .result-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<!-- ── START SCREEN ── -->
<div id="startScreen" class="screen active">
  <div class="start-card">
    <h1>단어 퀴즈</h1>
    <p>단어를 보고 뜻을 입력하세요</p>

    <div class="input-group">
      <label>풀 문제 수</label>
      <input type="number" id="countInput" min="1" max="600" value="100" placeholder="예: 100">
    </div>
    <div class="input-group">
      <label>문제당 제한 시간 (초)</label>
      <input type="number" id="timerInput" min="1" max="60" value="5" placeholder="예: 5">
    </div>
    <p class="hint">전체 단어 수: <span id="totalCount">0</span>개</p>

    <button class="btn-start" onclick="startQuiz()">시작하기</button>
  </div>
</div>

<!-- ── QUIZ SCREEN ── -->
<div id="quizScreen" class="screen">
  <div class="quiz-header">
    <span class="progress-text" id="progressText">1 / 100</span>
    <button class="btn-pause" id="pauseBtn" onclick="togglePause()">일시정지</button>
  </div>

  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timerBar"></div>
  </div>

  <div class="word-card">
    <div class="word-label">단어</div>
    <div class="word-display" id="wordDisplay">—</div>
    <div class="timer-count" id="timerCount">5초</div>
  </div>

  <div class="answer-wrap">
    <input type="text" class="answer-input" id="answerInput" placeholder="뜻을 입력하세요" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn-next" onclick="submitAnswer()">다음 →</button>
  </div>
</div>

<!-- ── RESULT SCREEN ── -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <div class="result-summary">
      <h2>퀴즈 완료!</h2>
      <div class="score-display">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-total" id="scoreTotal">/ 100</span>
      </div>
      <div class="score-pct" id="scorePct">정답률 0%</div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn tab-wrong active" id="tabWrongBtn" onclick="switchTab('wrong')">✗ 오답 <span id="wrongCount"></span></button>
      <button class="tab-btn tab-correct" id="tabCorrectBtn" onclick="switchTab('correct')">✓ 정답 <span id="correctCount"></span></button>
    </div>

    <div class="tab-panel active" id="panelWrong">
      <ul class="result-list" id="wrongList"></ul>
    </div>
    <div class="tab-panel" id="panelCorrect">
      <ul class="result-list" id="correctList"></ul>
    </div>

    <button class="btn-restart" onclick="restart()">다시 시작</button>
  </div>
</div>

<!-- ── PAUSE OVERLAY ── -->
<div class="pause-overlay" id="pauseOverlay">
  <h2>⏸ 일시정지</h2>
  <p>준비되면 다시 시작하세요</p>
  <button class="btn-resume" onclick="togglePause()">계속하기</button>
</div>

let TIMER_SEC = 5;
let questions = [], current = 0, correctAnswers = [], wrongAnswers = [];
let timerInterval = null, timeLeft = TIMER_SEC, isPaused = false, totalQ = 0;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('totalCount').textContent = WORD_DATA.length;
  document.getElementById('answerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
  });
  document.getElementById('countInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startQuiz();
  });
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const n = parseInt(document.getElementById('countInput').value);
  if (!n || n < 1) { alert('문제 수를 입력해주세요.'); return; }
  if (n > WORD_DATA.length) { alert(`단어 데이터가 ${WORD_DATA.length}개입니다. ${WORD_DATA.length} 이하로 입력해주세요.`); return; }
  const t = parseInt(document.getElementById('timerInput').value);
  if (!t || t < 1) { alert('제한 시간을 입력해주세요.'); return; }
  TIMER_SEC = t;
  totalQ = n;
  questions = shuffle(WORD_DATA).slice(0, n);
  current = 0; correctAnswers = []; wrongAnswers = [];
  showScreen('quizScreen');
  loadQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function loadQuestion() {
  if (current >= totalQ) { endQuiz(); return; }
  const [word] = questions[current];
  document.getElementById('wordDisplay').textContent = word;
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').disabled = false;
  document.getElementById('answerInput').focus();
  document.getElementById('progressText').textContent = `${current + 1} / ${totalQ}`;
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_SEC;
  updateTimerUI();
  timerInterval = setInterval(() => {
    if (isPaused) return;
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0; updateTimerUI(); clearInterval(timerInterval); recordAndNext('');
    } else { updateTimerUI(); }
  }, 100);
}

function updateTimerUI() {
  const pct = (timeLeft / TIMER_SEC) * 100;
  const bar = document.getElementById('timerBar');
  bar.style.width = pct + '%';
  if (pct > 60) bar.style.background = 'var(--timer-full)';
  else if (pct > 30) bar.style.background = 'var(--timer-mid)';
  else bar.style.background = 'var(--timer-low)';
  document.getElementById('timerCount').textContent = Math.ceil(timeLeft) + '초';
}

function submitAnswer() {
  if (isPaused) return;
  clearInterval(timerInterval);
  recordAndNext(document.getElementById('answerInput').value.trim());
}

function recordAndNext(input) {
  const [word, meaning] = questions[current];
  if (input === meaning) {
    correctAnswers.push({ word, meaning });
  } else {
    wrongAnswers.push({ word, meaning, input });
  }
  current++;
  loadQuestion();
}

function togglePause() {
  isPaused = !isPaused;
  const overlay = document.getElementById('pauseOverlay');
  const btn = document.getElementById('pauseBtn');
  const inputEl = document.getElementById('answerInput');
  if (isPaused) {
    overlay.classList.add('show'); btn.classList.add('paused'); btn.textContent = '계속하기'; inputEl.disabled = true;
  } else {
    overlay.classList.remove('show'); btn.classList.remove('paused'); btn.textContent = '일시정지';
    inputEl.disabled = false; inputEl.focus();
  }
}

function switchTab(tab) {
  const isWrong = tab === 'wrong';
  document.getElementById('tabWrongBtn').classList.toggle('active', isWrong);
  document.getElementById('tabCorrectBtn').classList.toggle('active', !isWrong);
  document.getElementById('panelWrong').classList.toggle('active', isWrong);
  document.getElementById('panelCorrect').classList.toggle('active', !isWrong);
}

function endQuiz() {
  clearInterval(timerInterval);
  showScreen('resultScreen');

  const correct = correctAnswers.length;
  const pct = Math.round((correct / totalQ) * 100);
  document.getElementById('scoreNum').textContent = correct;
  document.getElementById('scoreTotal').textContent = `/ ${totalQ}`;
  document.getElementById('scorePct').textContent = `정답률 ${pct}%`;
  document.getElementById('wrongCount').textContent = `(${wrongAnswers.length})`;
  document.getElementById('correctCount').textContent = `(${correctAnswers.length})`;

  // 오답 리스트 — 내 답(취소선) + 정답 둘 다 표시
  const wList = document.getElementById('wrongList');
  wList.innerHTML = '';
  if (wrongAnswers.length === 0) {
    wList.innerHTML = '<li class="empty-msg">오답 없음 🎉</li>';
  } else {
    wrongAnswers.forEach(({ word, meaning, input }) => {
      const myAns = input
        ? `<span class="item-mine">${esc(input)}</span>`
        : `<span class="item-skipped">미입력</span>`;
      wList.innerHTML += `
        <li class="result-item wrong-item">
          <span class="item-word">${esc(word)}</span>
          <div class="item-row"><span class="item-label">내 답</span>${myAns}</div>
          <div class="item-row"><span class="item-label">정답</span><span class="item-correct">${esc(meaning)}</span></div>
        </li>`;
    });
  }

  // 정답 리스트
  const cList = document.getElementById('correctList');
  cList.innerHTML = '';
  if (correctAnswers.length === 0) {
    cList.innerHTML = '<li class="empty-msg">정답 없음</li>';
  } else {
    correctAnswers.forEach(({ word, meaning }) => {
      cList.innerHTML += `
        <li class="result-item correct-item">
          <span class="item-word">${esc(word)}</span>
          <span class="item-meaning">${esc(meaning)}</span>
        </li>`;
    });
  }

  switchTab('wrong');
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function restart() {
  isPaused = false;
  document.getElementById('pauseOverlay').classList.remove('show');
  document.getElementById('pauseBtn').classList.remove('paused');
  document.getElementById('pauseBtn').textContent = '일시정지';
  showScreen('startScreen');
}
</script>
